# Pipeline directory layout
paths:
  raw_dir: data/rawdata
  proc_dir: data/procdata
  results_dir: data/results

dataset:
  # Stable identifier used in final result filenames
  id: cpg0016_emb
  version: v2.0.0
  # Public S3 bucket containing Cell Painting Gallery source data
  bucket: cellpainting-gallery
  # Top level bucket prefix for the CPG0016 JUMP dataset
  prefix: cpg0016-jump

sources:
  # Base URL for JUMP source metadata files
  metadata_base_url: https://raw.githubusercontent.com/jump-cellpainting/datasets/main/metadata

# Base AnnotationDB API URL
# The workflow appends /compound/all
annotationdb_api: https://v2annotationdb.bhklab.ca

# Profile model identifiers to process
# cpcnn and cellprofiler are enabled by default
# efficientnet is available but disabled while dense assay memory handling is deferred
# cpdistiller is source-limited and not enabled by default
models:
  - cpcnn_zenodo_7114558
  # - efficientnet_v2_imagenet21k_s_feature_vector_2_0260bc96
  - cellprofiler
  # - cpdistiller_mesmer_s41467_025_62193_z

selection:
  # CPG source folders to include
  sources:
    - source_1
    - source_2
    - source_3
    - source_5
    - source_6
    - source_7
    - source_8
    - source_9
    - source_10
    - source_11
  # Plate types to keep from the selected sources
  include_plate_types:
    - COMPOUND
  # Set to null to include every matching plate
  plate_limit_per_source: null
  # Use all compound wells including treatment wells and controls
  output_row_filter: all_compound_wells

download:
  # Redownload files even when a nonempty local copy exists
  overwrite: true
